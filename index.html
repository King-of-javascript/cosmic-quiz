<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Quiz</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at center, #0a0f2c 0%, #000000 70%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: url("https://www.transparenttextures.com/patterns/stardust.png");
    animation: moveStars 100s linear infinite;
    opacity: 0.3;
}

@keyframes moveStars {
    from { transform: translate(0, 0); }
    to { transform: translate(-1000px, -1000px); }
}

.quiz-container {
    width: 700px;
    padding: 40px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,170,255,0.5);
    position: relative;
    z-index: 2;
    text-align: center;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.primary-btn {
    background: #7f00ff;
    color: white;
}

.primary-btn:hover {
    background: #00d4ff;
}

.option-btn {
    width: 100%;
    background: rgba(0,170,255,0.2);
    border: 1px solid rgba(0,170,255,0.6);
    color: white;
}

.option-btn:hover {
    background: rgba(0,170,255,0.5);
    transform: scale(1.05);
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    font-size: 14px;
}

.progress {
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 5px;
    margin-bottom: 20px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00d4ff, #7f00ff);
    border-radius: 5px;
    transition: width 0.4s ease;
}

.feedback { margin-bottom: 10px; }
.correct { color: #00ff99; }
.wrong { color: #ff4d6d; }
</style>
</head>

<body>

<div class="quiz-container" id="app">
    <h1>🌌 Cosmic Quiz Portal</h1>
    <p>Select your mission:</p>
    <button class="primary-btn" onclick="startQuiz('basic')">Take Cosmic Knowledge Test</button>
    <button class="primary-btn" onclick="startQuiz('master')">Take Universe Master Quiz</button>
</div>

<script>

const basicQuiz = [
    {
        question: "How many moons does Mars have?",
        options: ["1", "2", "4", "8"],
        correct: 1
    },
    {
        question: "Which planet is closest to Earth?",
        options: ["Venus", "Mars", "Mercury", "Jupiter"],
        correct: 0
    },
    {
        question: "What is the largest planet in our Solar System?",
        options: ["Saturn", "Earth", "Jupiter", "Neptune"],
        correct: 2
    },
    {
        question: "What is the name of the largest moon of Saturn?",
        options: ["Europa", "Titan", "Ganymede", "Phobos"],
        correct: 1
    },
    {
        question: "How many planets are there in our Solar System?",
        options: ["7", "8", "9", "10"],
        correct: 1
    }
];
const masterQuiz = [

    {
        question: "What is currently the most massive known black hole discovered by astronomers?",
        options: ["Sagittarius A*", "TON 618", "Cygnus X-1", "M87*"],
        correct: 1
    },

    {
        question: "According to modern cosmology, what is the estimated age of the universe?",
        options: ["4.5 billion years", "10 billion years", "13.8 billion years", "20 billion years"],
        correct: 2
    },

    {
        question: "What is the name of the vast protective region created by the Sun that shields the Solar System from cosmic radiation?",
        options: ["Magnetosphere", "Heliosphere", "Oort Cloud", "Van Allen Belt"],
        correct: 1
    },

    {
        question: "What is the name of Earth's magnetic protective field that shields us from harmful solar radiation?",
        options: ["Heliosphere", "Magnetosphere", "Astrosphere", "Radiation Belt"],
        correct: 1
    },

    {
        question: "According to scientific research, what is the estimated age of the Earth?",
        options: ["3.2 billion years", "4.54 billion years", "5.8 billion years", "10 billion years"],
        correct: 1
    },

    {
        question: "What is the name of the spacecraft sent by NASA to study and orbit extremely close to the Sun?",
        options: ["Voyager 1", "Hubble Telescope", "Parker Solar Probe", "James Webb Telescope"],
        correct: 2
    },

    {
        question: "Which galaxy is on a collision course with the Milky Way in the distant future?",
        options: ["Triangulum Galaxy", "Whirlpool Galaxy", "Andromeda Galaxy", "Sombrero Galaxy"],
        correct: 2
    },

    {
        question: "What does the term 'Interstellar' literally mean?",
        options: ["Between planets", "Beyond the Solar System", "Between stars", "Inside a galaxy core"],
        correct: 2
    },

    {
        question: "Which planet is often referred to as Earth's 'cosmic shield' because it helps deflect or absorb many asteroids?",
        options: ["Saturn", "Mars", "Neptune", "Jupiter"],
        correct: 3
    },

    {
        question: "What natural process leads to the formation of a stellar black hole?",
        options: [
            "The collision of two planets",
            "The explosion and gravitational collapse of a massive star",
            "The cooling of a white dwarf",
            "The merging of asteroids"
        ],
        correct: 1
    }

];
let quizData = [];
let currentQuestion = 0;
let score = 0;

function startQuiz(mode) {

    quizData = mode === 'basic' ? basicQuiz : masterQuiz;
    currentQuestion = 0;
    score = 0;

    document.getElementById("app").innerHTML = `
        <div class="top-bar">
            <div id="question-count"></div>
            <div id="score-display"></div>
        </div>
        <div class="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div id="question"></div>
        <div class="feedback" id="feedback"></div>
        <div id="options"></div>
    `;

    loadQuestion();
}

function loadQuestion() {

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const progressBar = document.getElementById("progress-bar");
    const scoreDisplay = document.getElementById("score-display");
    const questionCount = document.getElementById("question-count");

    const data = quizData[currentQuestion];

    questionCount.textContent = `Question ${currentQuestion+1} / ${quizData.length}`;
    scoreDisplay.textContent = `Score: ${score} / ${quizData.length}`;
    progressBar.style.width = ((currentQuestion)/quizData.length)*100 + "%";

    questionEl.textContent = data.question;
    optionsEl.innerHTML = "";

    data.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.textContent = option;
        button.classList.add("option-btn");
        button.onclick = () => selectAnswer(index);
        optionsEl.appendChild(button);
    });
}

function selectAnswer(index) {

    const feedback = document.getElementById("feedback");
    const buttons = document.querySelectorAll(".option-btn");

    buttons.forEach(btn => btn.disabled = true);

    if(index === quizData[currentQuestion].correct){
        score++;
        feedback.textContent = "✅ Correct!";
        feedback.className = "feedback correct";
    } else {
        feedback.textContent = "❌ Wrong!";
        feedback.className = "feedback wrong";
    }

    setTimeout(() => {
        currentQuestion++;
        if(currentQuestion < quizData.length){
            loadQuestion();
        } else {
            showResult();
        }
    },1200);
}

function showResult(){

    document.getElementById("app").innerHTML = `
        <h2>🚀 Final Score: ${score} / ${quizData.length}</h2>
        <button class="primary-btn" onclick="location.reload()">Return to Portal</button>
    `;
}

</script>

</body>
</html>
