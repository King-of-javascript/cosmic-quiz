<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Cosmic Quiz | Official Universe Mission Portal</title>
    <meta name="description" content="Test your cosmic knowledge in the Ultimate Space Quiz. Master the universe, unlock missions, and prove your space expertise.">
    <meta name="keywords" content="space quiz, astronomy game, planets quiz, cosmic knowledge, science quiz">
    <meta name="author" content="Cosmic Quiz Team">

    <meta property="og:title" content="Cosmic Quiz Portal">
    <meta property="og:description" content="Are you a Universe Master? Take the mission now.">
    <meta property="og:url" content="https://king-of-javascript.github.io/cosmic-quiz/">
    <meta property="og:type" content="website">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0f2c 0%, #000000 70%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Space Background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: url("https://www.transparenttextures.com/patterns/stardust.png");
            animation: moveStars 100s linear infinite;
            opacity: 0.3;
            z-index: 1;
        }

        @keyframes moveStars {
            from { transform: translate(0, 0); }
            to { transform: translate(-1000px, -1000px); }
        }

        /* Responsive Container */
        .quiz-container {
            width: 95%;              
            max-width: 700px;        
            padding: 30px 20px;      
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,170,255,0.5);
            position: relative;
            z-index: 2;
            text-align: center;
            margin: 10px;            
        }

        /* Button Styles */
        button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .primary-btn {
            background: #7f00ff;
            color: white;
        }

        .primary-btn:hover {
            background: #00d4ff;
        }

        .option-btn {
            width: 100%;
            background: rgba(0,170,255,0.2);
            border: 1px solid rgba(0,170,255,0.6);
            color: white;
            margin: 5px 0;
        }

        .option-btn:hover {
            background: rgba(0,170,255,0.5);
            transform: scale(1.02);
        }

        /* UI Elements */
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .progress {
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00d4ff, #7f00ff);
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        .feedback { margin-bottom: 10px; height: 20px; font-weight: bold; }
        .correct { color: #00ff99; }
        .wrong { color: #ff4d6d; }
    </style>
</head>

<body>

    <div class="quiz-container" id="app">
        <h1>🌌 Cosmic Quiz Portal</h1>
        <p style="margin-bottom: 20px;">Select your mission:</p>
        <button class="primary-btn" onclick="startQuiz('basic')">Take Cosmic Knowledge Test</button>
        <button class="primary-btn" onclick="startQuiz('master')">Take Universe Master Quiz</button>
    </div>

    <audio id="ambientSound" loop>
        <source src="ambient.mp3" type="audio/mpeg">
    </audio>
    <audio id="correctSound">
        <source src="correct.mp3" type="audio/mpeg">
    </audio>
    <audio id="wrongSound">
        <source src="wrong.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- AUDIO CONTROL INITIALIZATION ---
        const ambient = document.getElementById("ambientSound");
        const correctSnd = document.getElementById("correctSound");
        const wrongSnd = document.getElementById("wrongSound");
        ambient.volume = 0.3; 

        // --- MOBILE TOUCH UNLOCKER ---
        function unlockAudio() {
            [ambient, correctSnd, wrongSnd].forEach(sound => {
                const playPromise = sound.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        if (sound !== ambient) {
                            sound.pause();
                            sound.currentTime = 0;
                        }
                    }).catch(e => console.log("Unlock waiting for gesture"));
                }
            });
            window.removeEventListener('touchstart', unlockAudio);
            window.removeEventListener('click', unlockAudio);
        }

        window.addEventListener('touchstart', unlockAudio);
        window.addEventListener('click', unlockAudio);

        const basicQuiz = [
            { question: "How many moons does Mars have?", options: ["1", "2", "4", "8"], correct: 1 },
            { question: "Which planet is closest to Earth?", options: ["Venus", "Mars", "Mercury", "Jupiter"], correct: 0 },
            { question: "What is the largest planet in our Solar System?", options: ["Saturn", "Earth", "Jupiter", "Neptune"], correct: 2 },
            { question: "What is the name of the largest moon of Saturn?", options: ["Europa", "Titan", "Ganymede", "Phobos"], correct: 1 },
            { question: "How many planets are there in our Solar System?", options: ["7", "8", "9", "10"], correct: 1 }
        ];

        const masterQuiz = [
            { question: "What is currently the most massive known black hole?", options: ["Sagittarius A*", "TON 618", "Cygnus X-1", "M87*"], correct: 1 },
            { question: "Estimated age of the universe?", options: ["4.5 billion years", "10 billion years", "13.8 billion years", "20 billion years"], correct: 2 },
            { question: "Protective region created by the Sun?", options: ["Magnetosphere", "Heliosphere", "Oort Cloud", "Van Allen Belt"], correct: 1 },
            { question: "Earth's magnetic protective field?", options: ["Heliosphere", "Magnetosphere", "Astrosphere", "Radiation Belt"], correct: 1 },
            { question: "Estimated age of the Earth?", options: ["3.2 billion years", "4.54 billion years", "5.8 billion years", "10 billion years"], correct: 1 },
            { question: "Spacecraft sent to study the Sun?", options: ["Voyager 1", "Hubble", "Parker Solar Probe", "James Webb"], correct: 2 },
            { question: "Galaxy colliding with the Milky Way?", options: ["Triangulum", "Whirlpool", "Andromeda", "Sombrero"], correct: 2 },
            { question: "What does 'Interstellar' mean?", options: ["Between planets", "Beyond Solar System", "Between stars", "Galaxy core"], correct: 2 },
            { question: "Earth's 'cosmic shield' planet?", options: ["Saturn", "Mars", "Neptune", "Jupiter"], correct: 3 },
            { question: "Formation of a stellar black hole?", options: ["Planet collision", "Collapse of a massive star", "Cooling white dwarf", "Asteroid merging"], correct: 1 }
        ];

        let quizData = [];
        let currentQuestion = 0;
        let score = 0;

        function startQuiz(mode) {
            unlockAudio();
            quizData = mode === 'basic' ? basicQuiz : masterQuiz;
            currentQuestion = 0;
            score = 0;

            document.getElementById("app").innerHTML = `
                <div class="top-bar">
                    <div id="question-count"></div>
                    <div id="score-display"></div>
                </div>
                <div class="progress">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div id="question" style="margin-bottom: 20px; font-size: 1.2rem;"></div>
                <div class="feedback" id="feedback"></div>
                <div id="options"></div>
            `;
            loadQuestion();
        }

        function loadQuestion() {
            const questionEl = document.getElementById("question");
            const optionsEl = document.getElementById("options");
            const progressBar = document.getElementById("progress-bar");
            const scoreDisplay = document.getElementById("score-display");
            const questionCount = document.getElementById("question-count");
            const feedback = document.getElementById("feedback");

            feedback.textContent = "";
            const data = quizData[currentQuestion];

            questionCount.textContent = `Mission: ${currentQuestion+1} / ${quizData.length}`;
            scoreDisplay.textContent = `Score: ${score}`;
            progressBar.style.width = ((currentQuestion)/quizData.length)*100 + "%";

            questionEl.textContent = data.question;
            optionsEl.innerHTML = "";

            data.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.textContent = option;
                button.classList.add("option-btn");
                button.onclick = () => selectAnswer(index);
                optionsEl.appendChild(button);
            });
        }

        function selectAnswer(index) {
            const feedback = document.getElementById("feedback");
            const buttons = document.querySelectorAll(".option-btn");
            buttons.forEach(btn => btn.disabled = true);

            if(index === quizData[currentQuestion].correct){
                score++;
                feedback.textContent = "✅ MISSION SUCCESS";
                feedback.className = "feedback correct";
                correctSnd.currentTime = 0; 
                correctSnd.play();
            } else {
                feedback.textContent = "❌ MISSION FAILURE";
                feedback.className = "feedback wrong";
                wrongSnd.currentTime = 0; 
                wrongSnd.play();
            }

            setTimeout(() => {
                currentQuestion++;
                if(currentQuestion < quizData.length){
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 1500);
        }

        function showResult(){
            document.getElementById("app").innerHTML = `
                <h2 style="margin-bottom: 20px;">🚀 Final Score: ${score} / ${quizData.length}</h2>
                <p style="margin-bottom: 20px;">Mission Complete, Commander.</p>
                <button class="primary-btn" onclick="location.reload()">Return to Portal</button>
            `;
        }
    </script>
</body>
</html>
